services:
  scraper:
    build: .
    volumes:
      - ./output:/app/output
      - ./checkpoint.db:/app/checkpoint.db
    env_file: .env
    command: python main.py --config config.yaml

  viewer:
    image: coleifer/sqlite-web
    volumes:
      - ./checkpoint.db:/data/checkpoint.db
    ports:
      - "8080:8080"
    profiles:
      - debug
