services:
  scraper:
    build: .
    volumes:
      - ./output:/app/output
    env_file: .env
    environment:
      - RUNNING_IN_DOCKER=1
    command: python main.py --config config.yaml

  viewer:
    image: coleifer/sqlite-web
    volumes:
      - ./output/checkpoint.db:/data/checkpoint.db
    ports:
      - "8080:8080"
    profiles:
      - debug
